name: Daily Green Contributions

on:
  schedule:
    # Runs at 9 PM IST (3:30 PM UTC)
    - cron: '30 15 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  contribute:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: 
          - name: daily-log
            file: log.md
            content: "📅 Daily log: "
          - name: learning-notes
            file: tips.md
            content: "💡 Note: "
          - name: snippets
            file: commands.md
            content: "⚡ Snippet: "
    steps:
      - name: Make commit (ALWAYS runs)
        run: |
          # Clone the repo
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository_owner }}/${{ matrix.repo.name }}.git
          cd ${{ matrix.repo.name }}
          
          # Configure git with YOUR email (REPLACE THESE TWO LINES)
          git config user.email "anubhavkiroula1@gmail.com"
          git config user.name "AnubhavKiroula"
          
          # Add random delay between 6-10 PM effect (sleep 0-90 min)
          RANDOM_DELAY=$((RANDOM % 5400))
          echo "Waiting $((RANDOM_DELAY/60)) minutes to look natural..."
          sleep $RANDOM_DELAY
          
          # Append timestamp and content
          echo "${{ matrix.repo.content }}$(date '+%Y-%m-%d %H:%M:%S')" >> ${{ matrix.repo.file }}
          
          # Commit and push
          git add ${{ matrix.repo.file }}
          git commit -m "Auto update: $(date '+%Y-%m-%d')"
          git push origin main
