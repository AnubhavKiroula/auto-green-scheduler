name: Daily Green Contributions

on:
  schedule:
    # Runs at 6 PM IST (12:30 PM UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  contribute:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [daily-log, learning-notes, snippets]
        include:
          - repo: daily-log
            file: log.md
            content: "📅 Daily log: "
          - repo: learning-notes
            file: tips.md
            content: "💡 Note: "
          - repo: snippets
            file: commands.md
            content: "⚡ Snippet: "
    steps:
      - name: Make 5 commits per repo (15 total)
        run: |
          # Clone the repo
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository_owner }}/${{ matrix.repo }}.git
          cd ${{ matrix.repo }}
          
          # Configure git
          git config user.email "anubhavkiroula1@gmail.com"
          git config user.name "AnubhavKiroula"
          
          # Detect default branch dynamically
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          echo "Default branch detected: $DEFAULT_BRANCH"
          
          # Random delay (0–90 min)
          RANDOM_DELAY=$((RANDOM % 5400))
          echo "Waiting $((RANDOM_DELAY/60)) minutes to look natural..."
          sleep $RANDOM_DELAY
          
          # Loop: 5 commits
          for i in 1 2 3 4 5; do
            echo "${{ matrix.content }}$(date '+%Y-%m-%d %H:%M:%S') - #$i" >> ${{ matrix.file }}
            git add ${{ matrix.file }}
            git commit -m "Auto update: $(date '+%Y-%m-%d') - commit $i"
            sleep 2
          done
          
          git push origin $DEFAULT_BRANCH
